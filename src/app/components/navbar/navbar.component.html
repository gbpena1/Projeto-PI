<nav class="navbar">
  <div class="nav-border"></div>
  <a routerLink="/" class="logo">
    <img src="assets/logo.png" alt="FLOW SUP" class="logo-image">
  </a>
  <div class="nav-links">
    <a href="#">LOJA ▾</a>
    <a href="#">LANÇAMENTOS ▾</a>
    <a href="#">SOBRE NÓS ▾</a>
  </div>
  <div class="nav-actions">
    <div class="search-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" placeholder="Buscar produtos...">
    </div>
    <button class="btn-icon" routerLink="/login">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
    <button class="btn-icon" [attr.data-count]="cartService.totalItems() > 0 ? cartService.totalItems() : null" (click)="toggleCart()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
    </button>
  </div>
</nav>

<app-cart-sidebar [isOpen]="cartOpen" (close)="toggleCart()"></app-cart-sidebar>
<div class="cart-overlay" [class.active]="cartOpen" (click)="toggleCart()"></div>
